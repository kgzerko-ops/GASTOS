<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>GastósPro</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
</head>
<body>

<div id="app-loading" class="loading-screen">
  <div class="spinner"></div>
  <p>Cargando GastósPro…</p>
</div>

<div id="app" class="app hidden">
  <!-- Login view -->
  <section id="view-login" class="login-view hidden">
    <div class="login-card">
      <h1>GastósPro</h1>
      <p class="subtitle">Gestión de gastos con formato legal español</p>
      <button id="btn-login-google" class="btn btn-primary btn-block">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Entrar con Google
      </button>
      <div class="login-divider"><span>o</span></div>
      <input type="email" id="login-email" placeholder="Email" class="input">
      <input type="password" id="login-password" placeholder="Contraseña" class="input">
      <button id="btn-login-email" class="btn btn-secondary btn-block">Entrar con email</button>
      <button id="btn-register" class="btn btn-link btn-block">Crear cuenta nueva</button>
      <p id="login-error" class="error-msg"></p>
    </div>
  </section>

  <!-- Access denied view -->
  <section id="view-denied" class="denied-view hidden">
    <div class="denied-card">
      <div class="denied-icon">🔒</div>
      <h2>Acceso pendiente</h2>
      <p>Tu cuenta existe pero aún no está activada. Contacta con el administrador de tu empresa.</p>
      <button id="btn-logout-denied" class="btn btn-secondary">Cerrar sesión</button>
    </div>
  </section>

  <!-- Main app -->
  <div id="view-main" class="main-view hidden">
    <header class="app-header">
      <div class="header-left">
        <button id="btn-menu" class="icon-btn hamburger" aria-label="Menú">☰</button>
        <h1 class="app-title">GastósPro</h1>
      </div>
      <div class="header-right">
        <span id="user-info" class="user-info"></span>
        <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
      </div>
    </header>

    <nav id="app-tabs" class="tabs">
      <button class="tab active" data-tab="panel">Panel</button>
      <button class="tab" data-tab="expenses">Gastos</button>
      <button class="tab admin-only hidden" data-tab="users">Usuarios</button>
      <button class="tab admin-only hidden" data-tab="reports">Reportes</button>
      <button class="tab admin-only hidden" data-tab="budgets">Presupuestos</button>
      <button class="tab" data-tab="settings">Ajustes</button>
    </nav>

    <main id="app-content" class="content"></main>

    <!-- Floating action button -->
    <button id="fab-new-expense" class="fab" title="Nuevo gasto">+</button>
  </div>

  <!-- Modal container -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>
</div>

<!-- Firebase via CDN as ES modules -->
<script type="module" src="js/app.js"></script>
</body>
</html>
